version: "3.9"

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket
      POSTGRES_DB: polymarket_bot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket -d polymarket_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c shared_buffers=128MB
        -c work_mem=4MB
        -c max_connections=30
        -c effective_cache_size=256MB

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://polymarket:polymarket@db:5432/polymarket_bot
    ports:
      - "80:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
